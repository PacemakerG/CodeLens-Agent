<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Request Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Claude Requests</h1>
        <div class="controls">
          <select id="date-select" title="Select date"></select>
          <input id="search" type="search" placeholder="Search…" autocomplete="off">
        </div>
      </div>
      <div id="request-list" class="request-list">
        <div class="empty-state">Loading…</div>
      </div>
    </aside>

    <!-- ── Detail panel ── -->
    <main class="detail-panel">
      <div id="detail-empty" class="empty-state">
        Select a request to view details
      </div>
      <div id="detail-content" class="detail-content" hidden>
        <div class="detail-meta" id="detail-meta"></div>
        <div class="tabs">
          <button class="tab-btn" data-tab="response">Response</button>
          <button class="tab-btn" data-tab="req-headers">Request Headers</button>
          <button class="tab-btn" data-tab="req-body">Request Body</button>
          <button class="tab-btn" data-tab="res-headers">Response Headers</button>
        </div>
        <div class="tab-panels">
          <div class="tab-panel" id="tab-response"></div>
          <div class="tab-panel" id="tab-req-headers"></div>
          <div class="tab-panel" id="tab-req-body"></div>
          <div class="tab-panel" id="tab-res-headers"></div>
        </div>
      </div>
    </main>

  </div>
  <script src="app.js"></script>
</body>
</html>
